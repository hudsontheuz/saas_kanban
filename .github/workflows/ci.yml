name: Go CI

on:
  push:
    branches: ["main", "feature/**", "refactor/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: saas_kanban_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U saas -d saas_kanban_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      TEST_DB_URL: postgres://saas:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/saas_kanban_test?sslmode=disable
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_ISSUER: saas_kanban
      PORT: 8080

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: gofmt (check)
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "Arquivos não formatados:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Testes
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...